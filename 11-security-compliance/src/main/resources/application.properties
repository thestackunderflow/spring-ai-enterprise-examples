spring.application.name=ep11-security-compliance

# Control 1 — Secrets: externalized, bound from an env var (or a vault). Never in code or the repo.
# In 2.0.0 the per-call spring.ai.openai.chat.options.api-key override is deprecated for removal — use this.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini

# Control 4 — Audit: SimpleLoggerAdvisor output.
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
