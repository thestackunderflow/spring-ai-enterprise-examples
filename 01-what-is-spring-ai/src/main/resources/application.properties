spring.application.name=ep01-what-is-spring-ai

# Key is read from the environment; the ":" default lets the app start (e.g. for tests) without one.
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# Flattened property path (Spring AI 2.0.0 — the nested spring.ai.openai.chat.options.* form is deprecated).
spring.ai.openai.chat.model=gpt-4o-mini
