spring.application.name=ep04-model-portability

# The one line that swaps providers — zero code change to ModelPortabilityDemo.
# Flip to `ollama` to run the same ChatClient call against a local, on-box model.
spring.ai.model.chat=openai

# --- OpenAI (cloud) ---
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini

# --- Ollama (local, on-box; data never leaves the machine) ---
# Requires a running Ollama (https://ollama.com) with the model pulled: `ollama pull llama3.2`
spring.ai.ollama.chat.model=llama3.2
# spring.ai.ollama.base-url=http://localhost:11434
