spring.application.name=ep09-observability

spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini

# Required for SimpleLoggerAdvisor to print prompts + responses.
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# Expose the metrics actuator so Spring AI's Micrometer observations (token usage, latency) are visible.
management.endpoints.web.exposure.include=health,metrics
